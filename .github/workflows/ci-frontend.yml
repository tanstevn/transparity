name: Continuous Integration — Frontend

on:
  push:
    branches:
      - "master"
    paths:
      - "Frontend/**"
  pull_request:
    branches:
      - "master" 
    paths:
      - "Frontend/**"
  workflow_dispatch:
  
jobs:
  build:
    name: Pipeline Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Frontend

    outputs:
      version: ${{ steps.build_version.outputs.semVer }}

    permissions:
      id-token: write
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0

      - name: Install git version
        uses: gittools/actions/gitversion/setup@v4.2.0
        with:
          versionSpec: 6.4.x

      - name: Determine build version
        id: build_version
        uses: gittools/actions/gitversion/execute@v4.2.0
        with:
          disableCache: true

      - name: Print build version
        run: echo "This build will be versioned as ${{ steps.build_version.outputs.semVer }}"
    
      - name: Setup target node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: ./Frontend/package-lock.json

      - name: Perform dependencies installation
        run: npm ci --prefer-online

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "typescript"

      - name: Build project
        run: npm run build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: Run unit tests
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "./Frontend/coverage/lcov.info"
          fail_ci_if_error: true
          verbose: true

      - name: Upload artifact to AWS S3
        uses: anilrajrimal1/artifact-uploader@v1.0.4
        with:
          aws-role-arn: ${{ vars.AWS_S3_OIDC_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          project-name: "transparity"
          s3-base-path: ${{ vars.AWS_S3_BASE_PATH }}
          source-directory: "./Frontend/out"
