name: Continuous Integration — Frontend

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master" 
    paths:
      - "Frontend/**"
  workflow_dispatch:
  
env:
  IMAGE_NAME: ghcr.io/${{ github.actor }}/transparity-frontend
  
jobs:
  build:
    name: Pipeline Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Frontend

    outputs:
      version: ${{ steps.build_version.outputs.semVer }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.1
        with:
          fetch-depth: 0

      - name: Install git version
        uses: gittools/actions/gitversion/setup@v4.2.0
        with:
          versionSpec: 6.4.x

      - name: Determine build version
        id: build_version
        uses: gittools/actions/gitversion/execute@v4.2.0
        with:
          disableCache: true

      - name: Print build version
        run: echo "This build will be versioned as ${{ steps.build_version.outputs.semVer }}"
    
      - name: Setup target node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: ./Frontend/package-lock.json

      - name: Perform dependencies installation
        run: npm ci --prefer-online

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "typescript"

      - name: Build project
        run: npm run build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: Run unit tests
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "coverage/lcov.info"
          fail_ci_if_error: true
          verbose: true

      - name: Build container image
        run: |
          IMAGE_TAG=${{ steps.build_version.outputs.semVer }}
          docker build --no-cache \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -f Dockerfile \
            --progress=plain .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

      - name: Perform container image scan
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Publish container image
        run: |
          IMAGE_TAG=${{ steps.build_version.outputs.semVer }}
          docker push $IMAGE_NAME:$IMAGE_TAG